<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoConf — Professional Meeting</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ─── JOIN SCREEN ─────────────────────────────────────── -->
  <div id="join-screen" class="join-screen">
    <div class="join-card">
      <div class="join-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#2D8CFF"/>
            <path d="M6 9.5C6 8.67 6.67 8 7.5 8h9C17.33 8 18 8.67 18 9.5v9c0 .83-.67 1.5-1.5 1.5h-9A1.5 1.5 0 0 1 6 18.5v-9Z" fill="white"/>
            <path d="M19 11.5l3-2v9l-3-2v-5Z" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">VideoConf</span>
      </div>
      <h1>Join a Meeting</h1>
      <p class="join-subtitle">Connect with anyone, anywhere.</p>

      <div class="form-group">
        <label for="name-input">Your Name</label>
        <input id="name-input" type="text" placeholder="Jane Doe" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="room-input">Meeting ID</label>
        <input id="room-input" type="text" placeholder="e.g. my-team-standup" autocomplete="off" />
      </div>
      <button id="join-btn" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Join Meeting
      </button>
      <p class="join-hint">Share the Meeting ID with others to invite them.</p>
    </div>
  </div>

  <!-- ─── MEETING ROOM ─────────────────────────────────────── -->
  <div id="meeting-room" class="meeting-room hidden">

    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="logo-icon small">
          <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#2D8CFF"/>
            <path d="M6 9.5C6 8.67 6.67 8 7.5 8h9C17.33 8 18 8.67 18 9.5v9c0 .83-.67 1.5-1.5 1.5h-9A1.5 1.5 0 0 1 6 18.5v-9Z" fill="white"/>
            <path d="M19 11.5l3-2v9l-3-2v-5Z" fill="white"/>
          </svg>
        </div>
        <span id="room-label" class="room-label"></span>
      </div>
      <div class="top-bar-center">
        <span id="meeting-timer" class="meeting-timer">00:00</span>
      </div>
      <div class="top-bar-right">
        <button id="invite-btn" class="btn-ghost" title="Copy invite link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          Copy Link
        </button>
      </div>
    </header>

    <!-- Main content -->
    <div class="content-area">

      <!-- Video grid -->
      <div class="video-section">
        <div id="main-video-wrapper" class="main-video-wrapper">
          <video id="main-video" autoplay playsinline></video>
          <div id="main-label" class="main-label">You</div>
          <div id="main-status" class="main-status-icons"></div>
        </div>

        <div id="participants-strip" class="participants-strip">
          <!-- Thumbnail tiles injected here -->
        </div>
      </div>

      <!-- Chat panel -->
      <div id="chat-panel" class="chat-panel hidden">
        <div class="chat-header">
          <span>In-Meeting Chat</span>
          <button id="close-chat-btn" class="btn-icon" title="Close chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="Type a message…" />
          <button id="send-btn" class="btn-send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Control bar -->
    <footer class="control-bar">
      <div class="controls-left">
        <span id="participant-count" class="participant-count">1 participant</span>
      </div>
      <div class="controls-center">
        <button id="toggle-audio-btn" class="ctrl-btn active" title="Toggle Microphone">
          <svg class="icon-mic-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <svg class="icon-mic-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
            <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span>Mute</span>
        </button>

        <button id="toggle-video-btn" class="ctrl-btn active" title="Toggle Camera">
          <svg class="icon-vid-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <svg class="icon-vid-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <span>Stop Video</span>
        </button>

        <button id="chat-btn" class="ctrl-btn" title="Open Chat">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Chat</span>
          <span id="chat-badge" class="chat-badge hidden">0</span>
        </button>

        <button id="share-screen-btn" class="ctrl-btn" title="Share Screen">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span>Share</span>
        </button>

        <button id="leave-btn" class="ctrl-btn leave" title="Leave Meeting">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Leave</span>
        </button>
      </div>
      <div class="controls-right"></div>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
